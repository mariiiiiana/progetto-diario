<!doctype html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>diary.archive - improved interactive prototype</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="poster" id="poster">
  <header class="site-header">
    <div class="title">diary.archive</div>

  </div>
</div>
<script src="theme-semantic-labels.js"></script>
<script src="script.js"></script>
