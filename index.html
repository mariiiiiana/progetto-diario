<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>things i couldn't say out loud</title>
<link rel="stylesheet" href="style.css" />
</head>
<body class="landing-active">
<div class="landing" id="landing">
  <div class="landing-stage">
    <h1 class="landing-sr-title">everything i can't say outloud</h1>
    <div class="landing-cloud" id="landingCloud">
      <div class="landing-phrase">
        <span class="landing-unit landing-unit--word-first">
          <span class="landing-paren landing-paren--open">(</span>
          <span class="landing-word">everything</span>
          <span class="landing-slots">
            <div class="landing-slot"></div>
            <div class="landing-slot"></div>
            <div class="landing-slot"></div>
          </span>
          <span class="landing-paren landing-paren--close">)</span>
        </span>
        <span class="landing-unit">
          <span class="landing-paren landing-paren--open">(</span>
          <span class="landing-slots">
            <div class="landing-slot"></div>
            <div class="landing-slot"></div>
          </span>
          <span class="landing-word">i</span>
          <span class="landing-paren landing-paren--close">)</span>
        </span>
        <span class="landing-unit">
          <span class="landing-paren landing-paren--open">(</span>
          <span class="landing-slots">
            <div class="landing-slot"></div>
            <div class="landing-slot"></div>
          </span>
          <span class="landing-word has-descenders">can't</span>
          <span class="landing-paren landing-paren--close">)</span>
        </span>
        <span class="landing-unit">
          <span class="landing-paren landing-paren--open">(</span>
          <span class="landing-slots">
            <div class="landing-slot"></div>
            <div class="landing-slot"></div>
          </span>
          <span class="landing-word has-descenders">say</span>
          <span class="landing-paren landing-paren--close">)</span>
        </span>
        <span class="landing-unit landing-unit--word-first">
          <span class="landing-paren landing-paren--open">(</span>
          <span class="landing-word">outloud</span>
          <span class="landing-slots">
            <div class="landing-slot"></div>
            <div class="landing-slot"></div>
            <div class="landing-slot"></div>
          </span>
          <span class="landing-paren landing-paren--close">)</span>
        </span>
      </div>
    </div>
    <div class="landing-ui">
      <p class="landing-subtitle">a recollection of personal experiences</p>
      <button class="landing-enter" id="landingEnter" type="button">explore</button>
    </div>
  </div>
</div>
<div class="poster" id="poster" aria-hidden="true">
 <header class="site-header">
    <div class="site-brand">(everything) (i) (can 't) (say) (outloud)</div>
    <div style="display: inline-flex; gap: clamp(6px, 1vw, 12px); align-items: flex-end;">
      <button class="guide-trigger" id="guideTrigger" type="button" aria-label="Show guide">how to</button>
      <a href="about.html" class="guide-trigger" style="display: inline-flex; align-items: center; justify-content: center; text-decoration: none; height: 34px; box-sizing: border-box;">about</a>
    </div>
  </header>
  <div class="stage">
    <canvas id="iso" width="800" height="920" aria-label="Interactive isometric map of diary patterns"></canvas>
    <div class="overlay" id="overlay">
      <svg class="links" id="links"></svg>
      <div class="explode-layer" id="explodeLayer" aria-live="polite"></div>
    </div>
  </div>
  <div class="guide-backdrop" id="guideBackdrop" aria-hidden="true">
    <div class="guide-popup" role="dialog" aria-modal="true" aria-labelledby="guideTitle">
      <button class="guide-close" id="guideClose" type="button" aria-label="Close guide">×</button>
      <h2 class="guide-title" id="guideTitle">how to explore</h2>
      <ol class="guide-steps">
        <li><span class="guide-action">hover</span> a room to preview its pattern and frequent words</li>
        <li><span class="guide-action">click</span> a room to open its theme archive</li>
      </ol>
      <button class="guide-dismiss" id="guideDismiss" type="button">got it</button>
    </div>
  </div>
</div>
<script src="landing-photos.js"></script>
<script src="theme-semantic-labels.js"></script>
<script src="script.js"></script>
</body>
</html>
